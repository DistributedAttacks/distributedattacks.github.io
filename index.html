<!DOCTYPE html>
<html lang="en">
<head>

    <title>Portfolio | Your Name</title>
    <style>
        :root {
            --accent-red: #a00000;
            --bg-gray: #f4f4f4;
        }
        body {
            font-family: Georgia, serif;
            line-height: 1.6;
            margin: 0;
            background-color: white;
            color: #333;
        }
        header {
            border-top: 10px solid #2d3e2d; /* Dark green top bar */

            font-size: 0.9rem;
            margin-right: 20px;
            text-transform: capitalize;
        }
        .container {

            grid-template-columns: 1fr 300px;
            gap: 40px;
            padding: 20px 10%;
        }
        main h2 {
            color: var(--accent-red);
            font-family: Arial, sans-serif;
            border-bottom: 1px solid #ddd;
        }
        .sidebar {
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
        }
        .sidebar-box {
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

            padding: 5px 10px;
