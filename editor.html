<!DOCTYPE html>
<html>
<head>
    <title>Editor Login</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        .login-box { border: 1px solid #ccc; display: inline-block; padding: 20px; background: #f4f4f4; }
        input { display: block; margin: 10px auto; padding: 8px; }
        #editor-ui { display: none; }
        textarea { width: 100%; height: 300px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="login-ui" class="login-box">
    <h3>Restricted Access</h3>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="checkLogin()">Login</button>
</div>

<div id="editor-ui">
    <h2>Post Editor</h2>
    <p>Logged in as: <strong>LostSignals</strong></p>
    <textarea placeholder="Write your markdown or HTML here..."></textarea>
    <br>
    <button onclick="alert('Static site: You must commit changes to GitHub to save.')">Save Draft</button>
</div>

<script>
    function checkLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        
        if(u === "LostSignals" && p === "B1cycl3s") {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('editor-ui').style.display = 'block';
        } else {
            alert("Invalid Credentials");
        }
    }
</script>
</body>
</html>
